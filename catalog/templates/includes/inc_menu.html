<div class="d-flex flex-column flex-md-row align-items-center p-3 px-md-4 mb-3 bg-white border-bottom box-shadow">
    <h5 class="my-0 mr-md-auto font-weight-normal">Skystore</h5>
    <nav class="ms-5 d-flex">
        <a class="p-2 btn btn-outline-primary" href="/">Каталог</a>
        <a class="p-2 btn btn-outline-primary" href="/contacts/">Контакты</a>
        <a class="p-2 btn btn-outline-primary" href="/add_product/">Добавить товар</a>
        <a class="p-2 btn btn-outline-primary" href="/blog/">Блог</a>
        {% if user.is_authenticated %}
        <a class="p-2 btn btn-outline-primary" href="/users/update/{{ user.id }}/">Редактировать профиль</a>
        <form method="post" action="/users/logout/" class="d-inline">
            {% csrf_token %}
            <button type="submit" class="p-2 btn btn-outline-primary">Выход</button>
        </form>
        {% else %}
        <a class="p-2 btn btn-outline-primary" href="/users/login/">Вход</a>
        <a class="p-2 btn btn-outline-primary" href="/users/register/">Регистрация</a>
        {% endif %}
    </nav>
</div>
