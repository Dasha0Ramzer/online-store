{% extends 'base.html' %}
{% block content %}
<div class="pricing-header px-3 py-3 pt-md-5 pb-md-4 mx-auto text-center">
    <h1 class="display-4">{{ product.name }}</h1>
</div>

    <div class="row">
        <div class="col-6" style="display: flex; align-items: center; justify-content: center;">
            <!-- Фото товара -->
            <img src="{{ product.picture.url }}" alt="Фото товара" style="max-width: 70%; height: auto;">
        </div>
        <div class="col-6" style="padding: 20px;">
            <h1 style="font-size: 2em;">{{ product.price }} ₽</h1>
            <p class="lead">Категория: {{ product.category }}</p>
            <p class="lead text-justify">Описание: {{ product.description }}</p>
            <button type="button" class="btn btn-lg btn-outline-primary">Купить</button>
        </div>
    </div>


{% endblock %}
