{% extends 'base.html' %}
{% block content %}
<div class="pricing-header px-3 py-3 pt-md-5 pb-md-4 mx-auto text-center">
    <h1 class="display-4">Добавление продукта</h1>
</div>


<div class="row text-start">
    <div class="col-12">
        <div class="card mb-4 box-shadow">
            <div class="card-header">
                <h4 class="lead my-0 font-weight-normal text-center">Хотите добавить свой продукт? Сделайте это!</h4>
            </div>
            <div class="card-body">
                <form method="post" action="" class="form-floating" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="name">Наименование</label>
                        <input type="text" name="name" class="form-control" id="name"
                               placeholder="Введите наименование продукта" required>
                    </div>
                    <div class="mb-3">
                        <label for="description">Описание</label>
                        <textarea name="description" class="form-control" id="description"
                                  placeholder="Введите описание продукта"></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="picture">Изображение</label>
                        <input type="file" name="picture" class="form-control" id="picture"
                               placeholder="Вставьте изображение">
                    </div>
                    <div class="mb-3">
                        <label for="category">Категория</label>
                        <input type="text" name="category" class="form-control" id="category"
                               placeholder="Введите категорию продукта" required>
                    </div>
                    <div class="mb-3">
                        <label for="price">Цена</label>
                        <input type="text" name="price" class="form-control" id="price"
                               placeholder="Введите стоимость продукта в рублях" required>
                    </div>
                    <button type="submit" class="btn btn-lg btn-block btn-outline-primary">Отправить</button>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
